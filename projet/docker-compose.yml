services:
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: student-mlops-mlflow
    env_file:
      - .env
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "${MLFLOW_SERVER_ALLOWED_HOSTS:-mlflow,localhost:*,127.0.0.1:*,172.16.*,172.17.*,172.18.*,172.19.*,172.20.*,172.21.*,172.22.*,172.23.*,172.24.*,172.25.*,172.26.*,172.27.*,172.28.*,172.29.*,172.30.*,172.31.*,192.168.*,10.*}"
      GUNICORN_CMD_ARGS: '--forwarded-allow-ips="*"'
    command:
      [
        "mlflow",
        "server",
        "--backend-store-uri",
        "/app/mlruns",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
        "--allowed-hosts",
        "${MLFLOW_SERVER_ALLOWED_HOSTS:-mlflow,localhost:*,127.0.0.1:*,172.16.*,172.17.*,172.18.*,172.19.*,172.20.*,172.21.*,172.22.*,172.23.*,172.24.*,172.25.*,172.26.*,172.27.*,172.28.*,172.29.*,172.30.*,172.31.*,192.168.*,10.*}",
      ]
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - ./mlruns:/app/mlruns

  trainer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: student-mlops-trainer
    env_file:
      - .env
    command: ["python", "-m", "src.train"]
    volumes:
      - ./artifacts:/app/artifacts
      - ./mlruns:/app/mlruns
    depends_on:
      - mlflow
    profiles:
      - training

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: student-mlops-api
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./mlruns:/app/mlruns
    depends_on:
      - mlflow
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: student-mlops-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy
